<div class="card portal">
                    
    <div class="card-title"><b>Add Phone Number</b></div>
    <hr>
    <div class="row">
        <div class="col-12 col-sm-6">
            Phone Number
        </div>
        <div class="col-12 col-sm-6">
            <input type="text" [(ngModel)]="phoneNumberValue">
        </div>
    </div>
    <hr>
    <div class="row">
        <div class="col-12 col-sm-6">
            Phone Type
        </div>
        <div class="col-12 col-sm-6">
            <select class="drop-pho" id="drop-pho" (change)="GetChosenPhoneNumber()" [(ngModel)]="phoneNumberType">
                <option *ngFor="let phoneNumberType of phoneNumberTypes; let i = index" [value]="i">{{ phoneNumberType.display }}</option>
            </select>
        </div>
    </div>
    <hr>

    <div class="portal-footer text-center">
        <div class="row individual-buttons"> 
            <div class="col-4 justify-content-center text-center">
                <button (click)="Save()">Save</button>
            </div>
            <div class="col-4 justify-content-center text-center">
                <button (click)="Reset()">Reset</button>
            </div>
            <div class="col-4 justify-content-center text-center">
                <button (click)="Cancel()">Cancel</button>
            </div>
        </div>
    </div>
</div>
