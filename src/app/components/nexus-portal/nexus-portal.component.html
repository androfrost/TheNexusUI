<div class="container-fluid outer-container">
    <div>Welcome to The Nexus, {{ userName }}!</div>
    <div class="card main">
        <div class="row main-row">
            <div class="col-sm-4 col-12 nexus-ready">
                <div *ngIf="portalState === portal.NexusPortal">
                    <app-entrance-portal 
                        [userName]="userName"
                        (goToNextPortal)="activatePortal($event)"
                        (userNameChange)="setUserName($event)"
                    ></app-entrance-portal>
                </div>

                <div *ngIf="portalState === portal.ChoosePortal">
                    <!-- <app-main-menu (goToNextPortal)="activatePortal($event)"></app-main-menu> -->
                    <app-options
                        [entrancePortal]="portal.NexusPortal"
                        [optionName]="'Main'"
                        [optionButtonNames]="['Individual','Family','Location','Phone Number']"
                        [optionButtonPortals]="[portal.IndividualOptions, portal.FamilyOptions, portal.LocationOptions, portal.PhoneNumberOptions]"
                        (goToNextPortal)="activatePortal($event)"
                        (selectedItemChange)="resetData()">
                    </app-options>
                </div>

                <div *ngIf="portalState === portal.FamilyUpsert">
                    <app-family-upsert 
                        [allPortalNavigation] =     allPortalStates
                        [upsertFamily] =            familyMain
                        (goToNextPortal) =          activatePortal($event)
                    ></app-family-upsert>
                </div>

                <div *ngIf="portalState === portal.IndividualOptions">
                    <!-- <app-individual-options 
                        [entrancePortal] =          portal.ChoosePortal 
                        (goToNextPortal) =          activatePortal($event)
                        (selectedItemChange) =      resetData()
                    ></app-individual-options> -->
                    <app-options
                        [entrancePortal]="portal.ChoosePortal"
                        [optionName]="'Individual'"
                        [optionButtonNames]="['Add Individual','Find Individual']"
                        [optionButtonPortals]="[portal.IndividualUpsert, portal.IndividualLookup]"
                        (goToNextPortal)="activatePortal($event)"
                        (selectedItemChange)="resetData()">
                    </app-options>
                </div>

                <div *ngIf="portalState === portal.IndividualUpsert">
                    <app-individual-upsert 
                        [allPortalNavigation] =         allPortalStates
                        [dropdownDto] =                 dropdownDtoMain
                        [locationDropdownDto] =         dropdownDtoLocationMain
                        [phoneNumberDropdownDto] =      dropdownDtoPhoneNumberMain
                        [individualTypeDropdownDto] =   dropdownDtoIndividualTypeMain
                        [upsertIndividual] =            individualMain
                        (goToNextPortal) =              activatePortal($event)>
                    </app-individual-upsert>
                </div>

                <div *ngIf="portalState === portal.IndividualLookup">
                    <ng-container *ngIf="!loadingLookup; else loadingTpl">
                        <app-individual-lookup 
                            [allPortalNavigation] = allPortalStates
                            [lookupDto] =           lookupDtoMain
                            [dropdownDto] =         dropdownDtoMain
                            [lookupPortal] =        portal.IndividualUpsert
                            [filteredSecondaryId] = familyMain.familyId
                            (goToNextPortal) =      activatePortal($event)
                            (selectedItemChange) =  onSelectedItemChange($event)
                            (sortChange) =          updateSort($event)
                            (assignedFlagChanges) = setAssignedFlagChanges($event)
                        ></app-individual-lookup>
                    </ng-container>
                    <ng-template #loadingTpl>
                        <div class="card portal">
                            <div class="card-title"><b>Loading Individuals...</b></div>
                            <div class="spinner-wrapper">
                                <div class="spinner" aria-hidden="true"></div>
                            </div>
                        </div>
                    </ng-template>
                </div>

                <div *ngIf="portalState === portal.FamilyOptions">
                    <!-- <app-family-options 
                        [entrancePortal] =          portal.ChoosePortal 
                        (goToNextPortal) =          activatePortal($event)
                        (selectedItemChange) =      resetData()
                    ></app-family-options> -->
                    <app-options
                        [entrancePortal]="portal.ChoosePortal"
                        [optionName]="'Family'"
                        [optionButtonNames]="['Add Family','Find Family']"
                        [optionButtonPortals]="[portal.FamilyUpsert, portal.FamilyLookup]"
                        (goToNextPortal)="activatePortal($event)"
                        (selectedItemChange)="resetData()">
                    </app-options>
                </div>

                <div *ngIf="portalState === portal.FamilyLookup">
                    <ng-container *ngIf="!loadingFamily; else loadingFamilyTpl">
                        <app-individual-lookup  
                            [allPortalNavigation] = allPortalStates
                            [lookupDto] =           lookupDtoMain
                            [lookupPortal] =        portal.FamilyUpsert
                            
                            (goToNextPortal) =      activatePortal($event)
                            (selectedItemChange) =  onSelectedItemChange($event)
                            (sortChange) =          updateSort($event)
                        ></app-individual-lookup>
                    </ng-container>
                    <ng-template #loadingFamilyTpl>
                        <div class="card portal">
                            <div class="card-title"><b>Loading Families...</b></div>
                            <div class="spinner-wrapper">
                                <div class="spinner" aria-hidden="true"></div>
                            </div>
                        </div>
                    </ng-template>
                </div>

                <div *ngIf="portalState === portal.LocationUpsert">
                    <app-location-upsert 
                        [allPortalNavigation] =         allPortalStates
                        [upsertLocation] =              locationMain
                        [individualId] =                individualMain.individualId
                        (goToNextPortal) =              activatePortal($event)>
                    </app-location-upsert>
                </div>

                <div *ngIf="portalState === portal.LocationLookup">
                    <ng-container *ngIf="!loadingLocation; else loadingLocationTpl">
                        <app-individual-lookup  
                            [allPortalNavigation] = allPortalStates
                            [lookupDto] =           lookupDtoMain
                            [lookupPortal] =        portal.LocationUpsert
                            [hasAssignedFlag]=      shouldUseAssignedFlag(individualMain.individualId) 
                            
                            (goToNextPortal) =      activatePortal($event)
                            (selectedItemChange) =  onSelectedItemChange($event)
                            (sortChange) =          updateSort($event)
                            (assignedFlagChanges) = setAssignedFlagChanges($event)
                        ></app-individual-lookup>
                    </ng-container>
                    <ng-template #loadingLocationTpl>
                        <div class="card portal">
                            <div class="card-title"><b>Loading Locations...</b></div>
                            <div class="spinner-wrapper">
                                <div class="spinner" aria-hidden="true"></div>
                            </div>
                        </div>
                    </ng-template>
                </div>

                <div *ngIf="portalState === portal.LocationOptions">
                    <app-options
                        [entrancePortal]="portal.ChoosePortal"
                        [optionName]="'Location'"
                        [optionButtonNames]="['Add Location','Find Location']"
                        [optionButtonPortals]="[portal.LocationUpsert, portal.LocationLookup]"
                        (goToNextPortal)="activatePortal($event)"
                        (selectedItemChange)="resetData()">
                    </app-options>
                </div>

                <div *ngIf="portalState === portal.PhoneNumberUpsert">
                    <app-phone-number-upsert 
                        [allPortalNavigation] =         allPortalStates
                        [upsertPhoneNumber] =           phoneNumberMain
                        [individualId] =                individualMain.individualId
                        (goToNextPortal) =              activatePortal($event)>
                    </app-phone-number-upsert>
                </div>

                <div *ngIf="portalState === portal.PhoneNumberLookup">
                    <ng-container *ngIf="!loadingPhoneNumber; else loadingPhoneNumberTpl">
                        <app-individual-lookup  
                            [allPortalNavigation] = allPortalStates
                            [lookupDto] =           lookupDtoMain
                            [lookupPortal] =        portal.PhoneNumberUpsert
                            [hasAssignedFlag]=      shouldUseAssignedFlag(individualMain.individualId) 
                            
                            (goToNextPortal) =      activatePortal($event)
                            (selectedItemChange) =  onSelectedItemChange($event)
                            (sortChange) =          updateSort($event)
                            (assignedFlagChanges) = setAssignedFlagChanges($event)
                        ></app-individual-lookup>
                    </ng-container>
                    <ng-template #loadingPhoneNumberTpl>
                        <div class="card portal">
                            <div class="card-title"><b>Loading Phone Numbers...</b></div>
                            <div class="spinner-wrapper">
                                <div class="spinner" aria-hidden="true"></div>
                            </div>
                        </div>
                    </ng-template>
                </div>

                <div *ngIf="portalState === portal.PhoneNumberOptions">
                    <app-options
                        [entrancePortal]="portal.ChoosePortal"
                        [optionName]="'Phone Number'"
                        [optionButtonNames]="['Add Phone Number','Find Phone Number']"
                        [optionButtonPortals]="[portal.PhoneNumberUpsert, portal.PhoneNumberLookup]"
                        (goToNextPortal)="activatePortal($event)"
                        (selectedItemChange)="resetData()">
                    </app-options>
                </div>
            </div>
        </div>
    </div>
</div>
