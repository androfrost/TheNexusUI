<div class="card portal">
                    
    <div class="card-title"><b>Add Group</b></div>
    <hr>

    <div class="row">
        <div class="col-12 col-sm-6">
            Group Name
        </div>
        <div class="col-12 col-sm-6">
            <input type="text" [(ngModel)]="groupName">
        </div>
    </div>
    <hr>
    <div class="row">
        <div class="col-12 col-sm-6">
            Group Type
        </div>
        <div class="col-12 col-sm-6">
            <select class="drop-gro" id="drop-gro" (change)="GetChosenGroup()" [(ngModel)]="groupOption">
                <option *ngFor="let group of groups; let i = index" [value]="i">{{ group }}</option>
            </select>
        </div>
    </div>
    <hr>
    <div class="row">
        <div class="col-12 col-sm-6">
            Description
        </div>
        <div class="col-12 col-sm-6">
            <textarea [(ngModel)]="groupDescription" rows="3"></textarea>
        </div>
    </div>
    <div class="col-12">
        <button (click)="TraversePortal(portal.IndividualLookup)" [disabled]="!isUpdate">Lookup Members</button>
    </div>
    <hr>

    <div class="portal-footer text-center">
        <div class="row individual-buttons"> 
            <div class="col-4 justify-content-center text-center">
                <button (click)="Save()">Save</button>
            </div>
            <div class="col-4 justify-content-center text-center">
                <button (click)="Reset()">Reset</button>
            </div>
            <div class="col-4 justify-content-center text-center">
                <button (click)="Cancel()">Cancel</button>
            </div>
        </div>
    </div>
</div>
